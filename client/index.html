<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; color: #1f2937; }
      .app { max-width: 800px; margin: 2rem auto; padding: 1rem; background: #fff; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,.1); }
      .chat { margin: 1rem 0; max-height: 65vh; overflow-y: auto; }
      .message { margin: 0.5rem 0; padding: 0.75rem 1rem; border-radius: 12px; }
      .message.user { background: #e0f2fe; text-align: right; }
      .message.bot { background: #e7f5e6; text-align: left; }
      .input-area { display: flex; gap: 0.75rem; }
      input[type='text'] { flex: 1; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; }
      button { padding: 0.75rem 1rem; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
      button:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>AI Chatbot</h1>
      <div class="chat" id="chat"></div>
      <div class="input-area">
        <input id="message" type="text" placeholder="Ask me anything..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
